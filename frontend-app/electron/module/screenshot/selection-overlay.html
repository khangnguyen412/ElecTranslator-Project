<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: rgba(0, 0, 0, 0.3);
            cursor: crosshair;
            overflow: hidden;
        }

        #selection {
            position: absolute;
            border: 2px solid #fff;
            background: rgba(255, 255, 255, 0.2);
            display: none;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>
    <div id="selection"></div>
    <script>
        const { ipcRenderer } = require('electron');
        let startX, startY, isSelecting = false;
        const selectionDiv = document.getElementById('selection');

        // Cancel selection area
        const cancelSelection = () => {
            ipcRenderer.send('cancel-selection');
        };

        // Listen for ESC to cancel selection area
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' || e.keyCode === 27) {
                e.preventDefault();
                cancelSelection();
            }
        });

        // Listen for right-click to cancel selection area
        window.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            cancelSelection();
        });


        // Start selection area
        window.addEventListener('mousedown', (e) => {
            startX = e.clientX;
            startY = e.clientY;
            isSelecting = true;
            selectionDiv.style.display = 'block';
            selectionDiv.style.left = startX + 'px';
            selectionDiv.style.top = startY + 'px';
            selectionDiv.style.width = '0px';
            selectionDiv.style.height = '0px';
        });

        // Move selection area
        window.addEventListener('mousemove', (e) => {
            if (!isSelecting) return;
            const x = Math.min(startX, e.clientX);
            const y = Math.min(startY, e.clientY);
            const w = Math.abs(e.clientX - startX);
            const h = Math.abs(e.clientY - startY);
            selectionDiv.style.left = x + 'px';
            selectionDiv.style.top = y + 'px';
            selectionDiv.style.width = w + 'px';
            selectionDiv.style.height = h + 'px';
        });

        // End selection area
        window.addEventListener('mouseup', (e) => {
            if (!isSelecting) return;
            isSelecting = false;
            const x = Math.min(startX, e.clientX);
            const y = Math.min(startY, e.clientY);
            const width = Math.abs(e.clientX - startX);
            const height = Math.abs(e.clientY - startY);
            ipcRenderer.send('capture-selection', { x, y, width, height });
        });
    </script>
</body>

</html>
